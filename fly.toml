app = "hireos"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CHROMA_PATH = "/app/data/chroma"
  OUTPUT_DIR = "/app/data/output"
  DATABASE_URL = "sqlite:////app/data/swarm.db"

[[mounts]]
  source = "hireos_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
